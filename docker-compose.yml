version: "3.9"
services:
    postgres:
        container_name: postgres
        image: postgres:latest
        environment:
            POSTGRES_DB: "dyppis"
            POSTGRES_USER: "postgres"
            POSTGRES_PASSWORD: "postgres"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        ports:
            - "2727:5432"

volumes:
    postgres-data:
